repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mkdocs-build
        name: mkdocs build --strict
        language: system
        entry: .venv/bin/mkdocs build --strict --quiet
        files: ^(docs/.*\.md|mkdocs\.yml)$
        pass_filenames: false
