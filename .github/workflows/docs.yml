name: Deploy docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mike needs full history to manage gh-pages branch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install doc dependencies
        run: pip install mkdocs-material mkdocstrings[python] mike

      - name: Install pyclifer (needed by mkdocstrings to introspect the package)
        run: pip install -e .

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mike deploy --push --update-aliases "$VERSION" latest
          mike set-default --push latest

      - name: Deploy dev docs (on main push)
        if: github.ref == 'refs/heads/main'
        run: mike deploy --push dev